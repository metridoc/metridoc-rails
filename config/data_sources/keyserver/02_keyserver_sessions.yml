---
# Keyserver session table import
#
# Source: sessions.xlsx exported from Keyserver (one row per session).
# Adjust sheet_name if the workbook uses multiple sheets.
#
# duration is NOT imported from the source workbook. Keyserver exports it as
# an Excel duration cell, which Roo reads inconsistently — sub-day sessions
# arrive as Integer seconds but multi-day sessions arrive as an Excel-epoch
# DateTime that the integer importer rejects, silently dropping those rows.
# Since duration is exactly (logoff - logon), Keyserver::Session derives it in
# whole seconds on import instead. See Keyserver::Session#derive_duration.
#
# Columns intentionally excluded: idnt, agid, Duration (derived).

load_sequence:        2
target_model:         'Keyserver::Session'
target_adapter:       'xlsx'
file_name:            'sessions.xlsx'
truncate_before_load: 'yes'

# sheet_name: 'Sessions'   # uncomment if the workbook has multiple sheets

column_mappings:
  Computer Name: computer_name
  User Name:     user_name
  Logon:         logon
  Logoff:        logoff
  Address:       address
  Location:      location
