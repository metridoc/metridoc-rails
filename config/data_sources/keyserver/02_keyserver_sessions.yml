---
# Keyserver session table import
#
# Source: sessions.csv exported from Keyserver (one row per session).
#
# duration is stored as integer seconds; Util.valid_integer? handles
# conversion if Keyserver exports it as a formatted string (e.g. "3600").
#
# Columns intentionally excluded: idnt, agid.

load_sequence:        2
target_model:         'Keyserver::Session'
target_adapter:       'csv'
file_name:            'sessions.csv'
truncate_before_load: 'yes'

column_mappings:
  Computer Name: computer_name
  User Name:     user_name
  Logon:         logon
  Logoff:        logoff
  Duration:      duration
  Address:       address
  Location:      location
