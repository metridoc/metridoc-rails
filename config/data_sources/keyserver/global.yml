---
# Keyserver data source configuration
#
# Production: drop events.xlsx and sessions.xlsx into import_folder, then run:
#   rake import -- --config_folder keyserver
#
# The sheet_name key in each task file selects the correct worksheet when the
# workbook contains multiple sheets; omit it to default to the first sheet.

institution_code: 'UPENN'
import_folder:    '/tmp/keyserver'
